name: Android CI

on: 
  push:
    branches:
      - master
  pull_request:
    branches: 
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  #v4.3.1
      with:
        submodules: recursive
        persist-credentials: false
    
    - name: set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  #v4.8.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@d9c87d481d55275bb5441eef3fe0e46805f9ef70  #v3
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleProductionRelease
    
    - name: Build with Gradle (Unit tests)
      run: ./gradlew testProductionRelease
    
    - name: Build with Gradle (lintVitalRelease)
      run: ./gradlew lintVitalProductionRelease
      
    - name: Upload artifacts (debug apk)
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
      with:
        name: app
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload artifacts (lint results)
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
      with:
        name: lint-results.html
        path: app/build/reports/lint-results.html
